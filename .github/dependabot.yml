version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    labels:
      - dependencies
    commit-message:
      prefix: npm
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Vienna
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10
